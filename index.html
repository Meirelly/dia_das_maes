
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Márcia Alves da Silva</title>

  <style>

    body{
      margin:0;
      padding:0;
      font-family: Times New Roman, serif;
      background: linear-gradient(to bottom, #DC8474, #DC7499);
      text-align:center;
      color:#333;
    }

    .container{
      padding:40px 20px;
    }

    h1{
      font-size:65px;
      color:#39150E;
    }

    p{
      font-size:20px;
      max-width:600px;
      margin:auto;
      line-height:1.6;
    }

    img{
      width:300px;
      border-radius: 10px;
      margin-top:20px;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    .heart{
      font-size:50px;
      animation: pulse 1s infinite;
      margin-top:20px;
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
      }

      50%{
        transform:scale(1.2);
      }

      100%{
        transform:scale(1);
      }
    }

    .flower{
      font-size:30px;
      animation: girar 2s infinite;
      margin-top:10px;
      margin-bottom:10px;
    }

   @keyframes girar{

     0%{
       transform:rotate(0deg);
     }
     
     10%{
       transform:rotate(360deg);
     }

     40%{
       transform:rotate(360deg);
     }

     50%{
       transform:rotate(0deg);
     }

     100%{
       transform:rotate(0deg);
     }
   }

  </style>
</head>

<body>

    </div>

</body>
